<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>メディケア縁グループ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP','Segoe UI',sans-serif;
  background:#f7f8fa;
  color:#333;
  font-size:16px;
  line-height:1.6;
  -webkit-text-size-adjust:100%;
  padding-bottom:90px;
}

/* ── ヘッダー ── */
.header{
  background:linear-gradient(135deg,#3a7c6a 0%,#5ba894 100%);
  color:#fff;
  padding:28px 20px 32px;
  text-align:center;
}
.header-brand{
  font-size:12px;
  letter-spacing:3px;
  opacity:.8;
  margin-bottom:6px;
  text-transform:uppercase;
}
.header h1{
  font-size:21px;
  font-weight:800;
  letter-spacing:1px;
}
.header-sub{
  font-size:12px;
  opacity:.75;
  margin-top:6px;
}

/* ── 説明テキスト ── */
.desc{
  text-align:center;
  padding:18px 20px 6px;
  font-size:14px;
  color:#666;
}

/* ── 施設カード ── */
.cards{
  padding:12px 16px;
  display:flex;flex-direction:column;gap:12px;
}
.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 1px 6px rgba(0,0,0,.05);
  position:relative;
  overflow:hidden;
  text-decoration:none;
  color:inherit;
  display:block;
  transition:box-shadow .15s;
}
.card:active{box-shadow:0 1px 10px rgba(0,0,0,.1)}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:4px;
  background:#3a7c6a;
}
.card.upcoming::before{background:#f59e0b}

.card-body{
  display:flex;
  align-items:center;
  gap:14px;
}

/* アイコン */
.card-icon{
  width:48px;height:48px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  flex-shrink:0;
}
.card-icon.blog{background:#e8f5e9}
.card-icon.instagram{background:#fce4ec}
.card-icon.facility{background:#e3f2fd}

/* 施設情報 */
.card-info{flex:1;min-width:0}
.card-name{
  font-size:15px;
  font-weight:700;
  line-height:1.4;
  color:#1a1a2e;
}
.card-type{
  font-size:11px;
  color:#999;
  margin-top:1px;
}

/* 矢印 */
.card-arrow{
  flex-shrink:0;
  width:20px;height:20px;
  fill:#bbb;
}

/* 開業予定バッジ */
.badge-upcoming{
  display:inline-block;
  padding:3px 10px;
  border-radius:12px;
  font-size:11px;
  font-weight:700;
  background:#fef3c7;
  color:#b45309;
  margin-top:4px;
}

/* ── 注意書き ── */
.note{
  text-align:center;
  padding:16px 20px 20px;
  font-size:11px;
  color:#aaa;
  line-height:1.7;
}

/* ── LINE固定ボタン ── */
.line-cta{
  position:fixed;
  bottom:0;left:0;right:0;
  padding:10px 16px;
  padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:#fff;
  border-top:1px solid #e5e7eb;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
  z-index:100;
}
.line-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:15px;
  background:#06c755;
  color:#fff;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  text-decoration:none;
  letter-spacing:.5px;
  transition:background .15s;
}
.line-btn:active{background:#05a847}
.line-btn svg{width:22px;height:22px;fill:#fff}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">Medicare En Group</div>
  <h1 id="pageTitle">施設を選択</h1>
  <div class="header-sub" id="pageSub">閲覧したい施設をお選びください</div>
</header>

<div class="desc" id="pageDesc">施設をタップしてください</div>

<div id="cardList" class="cards"></div>

<div class="note">
  ※ 各施設の詳細は各ページにてご確認ください
</div>

<div class="line-cta">
  <a href="https://lin.ee/ZFJzoAy" class="line-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596a.626.626 0 01-.199.031c-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.271.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
    見学のご予約・お問い合わせ
  </a>
</div>

<script>
var FACILITIES = [
  {
    name: 'メディケア縁 八尾',
    type: '住宅型有料老人ホーム',
    upcoming: false,
    urls: {
      blog:      'https://www.medicareen.com/%e3%83%96%e3%83%ad%e3%82%b0/',
      instagram: 'https://www.instagram.com/medicare_en_yao_official/?hl=ja',
      facility:  'https://www.medicareen.com/'
    }
  },
  {
    name: 'メディケア縁 近鉄八尾駅前',
    type: '住宅型有料老人ホーム',
    upcoming: false,
    urls: {
      blog:      'https://www.medicareen-yaoekimae.com/%e3%83%96%e3%83%ad%e3%82%b0/',
      instagram: 'https://www.instagram.com/medicare_en_kinyao_official/?hl=ja',
      facility:  'https://www.medicareen-yaoekimae.com/'
    }
  },
  {
    name: 'メディケア縁 ALOHA',
    type: '住宅型有料老人ホーム',
    upcoming: false,
    urls: {
      blog:      'https://www.medicareen-aloha.com/%e3%83%96%e3%83%ad%e3%82%b0/',
      instagram: 'https://www.instagram.com/medicare_en_aloha_official/?hl=ja',
      facility:  'https://www.medicareen-aloha.com/'
    }
  },
  {
    name: 'メディケア結 枚方',
    type: '住宅型有料老人ホーム',
    upcoming: true,
    urls: {
      blog:      'https://www.medicareen-hirakata.com/%e3%83%96%e3%83%ad%e3%82%b0/',
      instagram: 'https://www.instagram.com/medicareen.hirakata/?hl=ja',
      facility:  'https://www.medicareen-hirakata.com/'
    }
  }
];

var TYPE_CONFIG = {
  blog: {
    title: 'ブログを選択',
    sub:   '閲覧したい施設のブログをお選びください',
    desc:  '施設をタップするとブログページが開きます',
    icon:  '📝',
    iconClass: 'blog',
    pageTitle: 'ブログ選択 | メディケア縁グループ'
  },
  instagram: {
    title: 'Instagramを選択',
    sub:   '閲覧したい施設のInstagramをお選びください',
    desc:  '施設をタップするとInstagramが開きます',
    icon:  '📸',
    iconClass: 'instagram',
    pageTitle: 'Instagram選択 | メディケア縁グループ'
  },
  facility: {
    title: '施設を選択',
    sub:   '閲覧したい施設をお選びください',
    desc:  '施設をタップするとホームページが開きます',
    icon:  '🏠',
    iconClass: 'facility',
    pageTitle: '施設選択 | メディケア縁グループ'
  }
};

function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function init() {
  var params = new URLSearchParams(window.location.search);
  var type = params.get('type') || 'facility';
  if (!TYPE_CONFIG[type]) type = 'facility';

  var cfg = TYPE_CONFIG[type];
  document.title = cfg.pageTitle;
  document.getElementById('pageTitle').textContent = cfg.title;
  document.getElementById('pageSub').textContent = cfg.sub;
  document.getElementById('pageDesc').textContent = cfg.desc;

  var container = document.getElementById('cardList');
  var html = '';

  for (var i = 0; i < FACILITIES.length; i++) {
    var f = FACILITIES[i];
    var url = f.urls[type] || f.urls.facility;
    html += '<a href="' + url + '" target="_blank" rel="noopener" class="card' + (f.upcoming ? ' upcoming' : '') + '">'
      + '<div class="card-body">'
      +   '<div class="card-icon ' + cfg.iconClass + '">' + cfg.icon + '</div>'
      +   '<div class="card-info">'
      +     '<div class="card-name">' + escapeHtml(f.name) + '</div>'
      +     '<div class="card-type">' + escapeHtml(f.type) + '</div>'
      +     (f.upcoming ? '<span class="badge-upcoming">7/2 開業予定</span>' : '')
      +   '</div>'
      +   '<svg class="card-arrow" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M7.3 4.3a1 1 0 011.4 0l5 5a1 1 0 010 1.4l-5 5a1 1 0 01-1.4-1.4L11.58 10 7.3 5.7a1 1 0 010-1.4z"/></svg>'
      + '</div>'
      + '</a>';
  }

  container.innerHTML = html;
}

init();
</script>
</body>
</html>
